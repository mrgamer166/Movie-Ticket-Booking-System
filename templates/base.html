<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}Movie Ticket Booking{% endblock %}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


</head>

<body>

<nav class="navbar">
    <h1 class="logo">🎬 Movie Booking</h1>

    <div class="nav-links">

    {% if "username" in session %}
        <span class="user">Welcome {{ session["username"] }}</span>
        <a href="{{ url_for('movies') }}">Movies</a>
        <a href="{{ url_for('admin_login') }}">Admin</a>
        <a href="{{ url_for('logout') }}">Logout</a>

    {% else %}
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('register') }}">Register</a>
    {% endif %}

    </div>
</nav>

<div class="page-content">

{% block content %}
{% endblock %}

</div>

<footer class="footer">
    <p>© 2026 Movie Ticket Booking System</p>
</footer>
<script src="{{ url_for('static', filename='js/validation.js') }}"></script>
</body>
</html>
