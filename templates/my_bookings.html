{% extends "base.html" %}

{% block title %}My Bookings{% endblock %}

{% block content %}

<div class="tickets-page">

    <h2 class="page-title">🎟️ My Bookings</h2>

    {% if bookings %}

    <div class="tickets-container">

        {% for b in bookings %}
        <div class="ticket-card">

            <div class="ticket-left">
                <h3 class="movie-name">{{ b[1] }}</h3>
                <p>💺 Seats: <span>{{ b[2] }}</span></p>
                <p>🕒 Time: {{ b[3] }}</p>
            </div>

            <div class="ticket-right">
                <button onclick="confirmCancel(event, '{{ b[0] }}')" class="cancel-btn">
                    Cancel
                </button>
            </div>

        </div>
        {% endfor %}

    </div>

    {% else %}
        <p class="no-bookings">No bookings yet 🎭</p>
    {% endif %}

</div>

<script>
function confirmCancel(event, bookingId){
    event.preventDefault();

    if(confirm("🎟️ Cancel this booking?")){
        window.location.href = "/cancel-booking/" + bookingId;
    }
}
</script>

{% endblock %}
