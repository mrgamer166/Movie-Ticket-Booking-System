{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h2>🚀 Create Account</h2>
        <p class="subtitle">Join us and start booking your tickets</p>

        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}

        <form method="POST">

            <div class="input-group">
                <input type="text" name="username" id="username"
                value="{{ request.form.username }}" placeholder="Username" required>
                <p id="username-status"></p>
            </div>

            <div class="input-group">
                <input type="email" name="email"
                value="{{ request.form.email }}" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" name="password"
                placeholder="Password (min 8 characters)" required>
            </div>

            <div class="input-group">
                <input type="password" name="confirm_password"
                placeholder="Confirm Password" required>
            </div>

            <button type="submit">Register</button>

        </form>

        <div class="auth-footer">
            <p>Already have an account?</p>
            <a href="/login">Login</a>
        </div>

    </div>

</div>

{% endblock %}
