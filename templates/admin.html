{% extends "base.html" %}

{% block content %}

<h2 style="text-align:center;">🛠 Admin Panel</h2>

<!-- 🎬 ADD MOVIE (ONLY MOVIE DATA) -->
<form method="POST" action="/add-movie" enctype="multipart/form-data" class="admin-form">

    <input name="name" placeholder="Movie Name" required>
    <input name="genre" placeholder="Genre" required>
    <input name="duration" placeholder="Duration" required>
    <input type="file" name="poster">

    <button>Add Movie</button>
</form>

<br><br>

<!-- 🎬 MOVIE LIST -->
<table class="admin-table">
<tr>
<th>Name</th>
<th>Genre</th>
<th>Duration</th>
<th>Poster</th>
<th>Add Show</th>
<th>Actions</th>
</tr>

{% for m in movies %}
<tr>

<td>{{ m.name }}</td>
<td>{{ m.genre }}</td>
<td>{{ m.duration }}</td>

<td>
    {% if m.poster %}
        <img src="{{ url_for('static', filename='uploads/' + m.poster) }}" width="60">
    {% endif %}
</td>

<!-- 🎯 ADD SHOW FOR THIS MOVIE -->
<td>
    <form method="POST" action="/add-show" class="show-form">

        <input type="hidden" name="movie_id" value="{{ m.id }}">

        <input type="date" name="show_date" required>
        <input type="time" name="show_time" required>

        <button>Add</button>

    </form>
</td>

<td>
    <a href="/delete-movie/{{ m.id }}">Delete</a>

    <form method="POST" action="/edit-movie/{{ m.id }}">
        <input name="name" placeholder="New Name">
        <input name="genre" placeholder="New Genre">
        <input name="duration" placeholder="New Duration">
        <button>Update</button>
    </form>
</td>

</tr>
{% endfor %}

</table>

{% endblock %}
